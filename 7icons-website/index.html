<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>7ICONS INDONESIA</title>

    <meta
      name="description"
      content="Fan website for Indonesian girl group 7ICONS" />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <div class="container">
        <!-- LOGO -->
        <div class="logo">
          <h1>7ICONS</h1>
        </div>

        <!-- SEARCH -->
        <div class="search">
          <form action="#" method="get">
            <input
              type="text"
              name="search"
              placeholder="Search..."
              aria-label="Search" />

            <button type="submit" aria-label="Search">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path
                  stroke="currentColor"
                  stroke-width="2"
                  d="M21 21l-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4z" />
              </svg>
            </button>
          </form>
        </div>

        <!-- NAVIGATION -->
        <nav>
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Members</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#">About</a></li>
          </ul>

          <!-- THEME TOGGLE -->
          <div class="theme-toggle">
            <span class="theme-icon">🌙</span>

            <label class="switch">
              <input type="checkbox" id="themeToggle" />

              <span class="slider"></span>
            </label>

            <span class="theme-icon">☀</span>
          </div>
        </nav>
      </div>
    </header>

    <!-- MAIN CONTENT (nanti kita isi) -->
    <main></main>

    <!-- FOOTER (nanti kita buat) -->
    <footer></footer>

    <!-- JAVASCRIPT -->
    <script src="js/script.js"></script>
  </body>
</html>
